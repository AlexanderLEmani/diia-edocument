<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Video Source</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 390px;
      height: 844px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 390px;
      height: 844px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      color: #000;
    }

    .gradient-bg {
      position: absolute;
      inset: -40%;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 20%, #6ec4c0 0%, transparent 45%),
        radial-gradient(circle at 80% 30%, #a8d4e0 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, #c8bce8 0%, transparent 45%),
        radial-gradient(circle at 10% 70%, #b8a8dc 0%, transparent 40%),
        linear-gradient(145deg, #6ec4c0 0%, #d8e4ec 50%, #b8a8dc 100%);
      animation: gradientMove 12s ease-in-out infinite alternate;
    }

    @keyframes gradientMove {
      0% { transform: translate(0%, 0%) rotate(0deg) scale(1); }
      33% { transform: translate(8%, -6%) rotate(8deg) scale(1.08); }
      66% { transform: translate(-6%, 8%) rotate(-6deg) scale(1.05); }
      100% { transform: translate(5%, 4%) rotate(4deg) scale(1.1); }
    }

    .app > *:not(.gradient-bg) { position: relative; z-index: 1; }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px 4px;
      font-size: 15px;
      font-weight: 600;
    }

    .dynamic-island {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #000;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
    }

    .document-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px);
      border-radius: 32px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      padding: 22px 24px 0;
    }

    .card-body { padding: 20px 24px 16px; }

    .card-row {
      display: flex;
      gap: 16px;
    }

    .photo-placeholder {
      width: 108px;
      height: 136px;
      border-radius: 12px;
      background: rgba(200, 210, 220, 0.5);
      flex-shrink: 0;
    }

    .data-fields {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-top: 4px;
    }

    .field-label {
      font-size: 13px;
      color: #8e8e93;
    }

    .field-value {
      font-size: 17px;
      font-weight: 700;
    }

    .ticker-wrap {
      background: #c8e6c0;
      overflow: hidden;
      height: 36px;
      display: flex;
      align-items: center;
    }

    .ticker {
      display: flex;
      white-space: nowrap;
      animation: scroll 18s linear infinite;
    }

    .ticker span {
      font-size: 12px;
      font-weight: 500;
      color: #2d4a28;
      padding: 0 8px;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .card-footer {
      background: rgba(210, 218, 228, 0.55);
      padding: 20px 24px;
      min-height: 88px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .name-placeholder {
      width: 180px;
      height: 28px;
      border-radius: 4px;
      background: rgba(0,0,0,0.06);
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pagination {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
    }

    .dot.active { background: rgba(255,255,255,0.95); }

    .bottom-nav {
      display: flex;
      background: #000;
      padding: 8px 8px 24px;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: rgba(255,255,255,0.55);
      font-size: 10px;
      font-weight: 500;
      text-decoration: none;
    }

    .nav-item.active { color: #fff; }

    .notification-dot {
      position: absolute;
      top: -1px;
      right: -1px;
      width: 8px;
      height: 8px;
      background: #ff3b30;
      border-radius: 50%;
      border: 1.5px solid #000;
    }

    .nav-avatar-wrap { position: relative; display: inline-flex; }
  </style>
</head>
<body>
  <div class="app">
    <div class="gradient-bg"></div>

    <header class="status-bar">
      <span>12:55</span>
      <div class="dynamic-island">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/>
          <path d="M12 7v5l3 2" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>30m</span>
      </div>
      <div class="status-icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
        <span>84</span>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="black" fill="none"/><rect x="2" y="2" width="16" height="8" rx="1.5"/><path d="M23 4v4a1.5 1.5 0 000-4z"/></svg>
      </div>
    </header>

    <main class="content">
      <article class="document-card">
        <h1 class="card-title">єДокумент</h1>
        <div class="card-body">
          <div class="card-row">
            <div class="photo-placeholder"></div>
            <div class="data-fields">
              <div>
                <div class="field-label">Дата народження:</div>
                <div class="field-value">01.01.1990</div>
              </div>
              <div>
                <div class="field-label">РНОКПП:</div>
                <div class="field-value">1234567890</div>
              </div>
            </div>
          </div>
        </div>
        <div class="ticker-wrap">
          <div class="ticker">
            <span>документ діє під час воєнного стану та 30 днів після його завершення або скасування &nbsp;&nbsp;&nbsp; документ діє під час воєнного стану та 30 днів після його завершення або скасування</span>
          </div>
        </div>
        <div class="card-footer">
          <div class="name-placeholder"></div>
          <div class="menu-btn">
            <svg width="16" height="4" viewBox="0 0 16 4"><circle cx="2" cy="2" r="2" fill="white"/><circle cx="8" cy="2" r="2" fill="white"/><circle cx="14" cy="2" r="2" fill="white"/></svg>
          </div>
        </div>
      </article>
      <div class="pagination">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="#">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8h10M7 12h10M7 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Стрічка</span>
      </a>
      <a class="nav-item active" href="#">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="11" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M4 16l3.5-3.5a1.5 1.5 0 012.1 0L14 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Документи</span>
      </a>
      <a class="nav-item" href="#">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 8l1.2 2.4 2.6.4-1.9 1.8.4 2.6L12 14.2l-2.3 1.2.4-2.6-1.9-1.8 2.6-.4L12 8z" fill="currentColor"/></svg>
        <span>Дія.AI</span>
      </a>
      <a class="nav-item" href="#">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M13 7l-4 8h3l-1 4 5-9h-3l1-3z" fill="currentColor"/></svg>
        <span>Сервіси</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-avatar-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M6 19c1.5-2.5 3.8-4 6-4s4.5 1.5 6 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span class="notification-dot"></span>
        </span>
        <span>Меню</span>
      </a>
    </nav>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#E1DECB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Профіль — Резерв+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="secret.css">
  <link rel="stylesheet" href="pwa.css">
</head>
<body>
  <div class="secret-app">
    <header class="secret-header">
      <a href="./" class="secret-back" aria-label="Назад">←</a>
      <h1>Дані профілю</h1>
    </header>

    <form class="secret-form" id="profileForm">
      <label class="secret-field">
        <span>Прізвище</span>
        <input type="text" id="lastName" name="lastName" autocomplete="family-name" required>
      </label>

      <label class="secret-field">
        <span>Ім'я</span>
        <input type="text" id="firstName" name="firstName" autocomplete="given-name" required>
      </label>

      <label class="secret-field">
        <span>По батькові</span>
        <input type="text" id="patronymic" name="patronymic" autocomplete="additional-name" required>
      </label>

      <label class="secret-field">
        <span>Дата народження</span>
        <input type="text" id="birthDate" name="birthDate" placeholder="30012001" inputmode="numeric" maxlength="10" autocomplete="bday">
      </label>

      <label class="secret-field">
        <span>РНОКПП</span>
        <input type="text" id="rnokpp" name="rnokpp" placeholder="3638805490" inputmode="numeric" maxlength="12" autocomplete="off">
      </label>

      <label class="secret-field">
        <span>Відсрочка до</span>
        <input type="text" id="deferralDate" name="deferralDate" placeholder="03082026" inputmode="numeric" maxlength="10">
      </label>

      <fieldset class="secret-fieldset">
        <legend>ВЛК</legend>
        <label class="secret-field">
          <span>Постанова ВЛК</span>
          <input type="text" id="vlkDecision" name="vlkDecision" placeholder="Придатний">
        </label>
        <label class="secret-field">
          <span>Дата ВЛК</span>
          <input type="text" id="vlkDate" name="vlkDate" placeholder="10022024" inputmode="numeric" maxlength="10">
        </label>
      </fieldset>

      <fieldset class="secret-fieldset">
        <legend>Оновлення документа</legend>
        <label class="secret-field">
          <span>Дата оновлення <em>(необов'язково)</em></span>
          <input type="text" id="docUpdatedDate" name="docUpdatedDate" placeholder="13062026" inputmode="numeric" maxlength="10">
        </label>
        <label class="secret-field">
          <span>Час оновлення <em>(необов'язково)</em></span>
          <input type="text" id="docUpdatedTime" name="docUpdatedTime" placeholder="0656" inputmode="numeric" maxlength="5">
        </label>
        <p class="secret-hint">Показується у рядку оновлення на картці Резерв ID.</p>
      </fieldset>

      <div class="secret-field">
        <span>Фото</span>
        <div class="secret-photo-row">
          <div class="secret-photo-preview" id="photoPreview" aria-hidden="true"></div>
          <label class="secret-upload">
            <input type="file" id="photoInput" accept="image/*">
            <span>Завантажити фото</span>
          </label>
        </div>
        <p class="secret-hint">Будь-який розмір — підженемо під рамку на картці.</p>
      </div>

      <div class="secret-field">
        <span>QR-код (зворот картки)</span>
        <div class="secret-photo-row">
          <div class="secret-qr-preview" id="qrPreview" aria-hidden="true"></div>
          <label class="secret-upload">
            <input type="file" id="qrInput" accept="image/*">
            <span>Завантажити QR</span>
          </label>
        </div>
        <p class="secret-hint">Якщо не завантажити — залишиться стандартний QR.</p>
      </div>

      <details class="secret-fieldset secret-details" id="extendedSection">
        <summary class="secret-details-summary">Розширені дані</summary>

        <label class="secret-field">
          <span>Статус</span>
          <input type="text" id="statusLabel" name="statusLabel" placeholder="Військовозобов'язаний">
        </label>

        <label class="secret-field">
          <span>ТЦК та СП</span>
          <input type="text" id="tcc" name="tcc" placeholder="Шевченківський районний у місті Дніпро ТЦК та СП">
        </label>

        <label class="secret-field">
          <span>Звання</span>
          <input type="text" id="rank" name="rank" placeholder="Солдат">
        </label>

        <label class="secret-field">
          <span>ВОС</span>
          <input type="text" id="vos" name="vos" placeholder="999097" inputmode="numeric">
        </label>

        <label class="secret-field">
          <span>Примітка</span>
          <input type="text" id="note" name="note" placeholder="Потребує проходження базової загальновійськової підготовки">
        </label>

        <label class="secret-field">
          <span>Номер Оберіг</span>
          <input type="text" id="registry" name="registry" placeholder="030220241429051900012" inputmode="numeric">
        </label>

        <label class="secret-field">
          <span>Телефон</span>
          <input type="tel" id="phone" name="phone" placeholder="+380 67 412 8831" autocomplete="tel">
        </label>

        <label class="secret-field">
          <span>Email</span>
          <input type="email" id="email" name="email" placeholder="bondarev.i.o@ukr.net" autocomplete="email">
        </label>

        <label class="secret-field">
          <span>Адреса</span>
          <input type="text" id="address" name="address" placeholder="Україна, Дніпропетровська область, м Дніпро, вул. Набережна Перемоги, б. 26, кв. 87">
        </label>

        <label class="secret-field">
          <span>Дата уточнення даних <em>(необов'язково)</em></span>
          <input type="text" id="dataUpdated" name="dataUpdated" placeholder="20052024" inputmode="numeric" maxlength="10">
        </label>

      </details>

      <div class="secret-actions">
        <button type="submit" class="secret-btn secret-btn--primary">Зберегти</button>
        <button type="button" class="secret-btn secret-btn--ghost" id="btnClear">Скинути профіль</button>
      </div>
    </form>

    <p class="secret-note" id="statusMsg" role="status"></p>
  </div>

  <script src="pwa.js"></script>
  <script src="admin/profile.js"></script>
  <script src="secret.js"></script>
</body>
</html>
